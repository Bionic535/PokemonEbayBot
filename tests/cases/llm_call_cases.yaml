- name: graded_charizard_complete
  input:
    messages:
      - role: human
        content: "I'm looking for a graded PSA 9 Base Set Charizard 4 from 1999 Max price $500."
      - role: human
        content: "no"
    query: {}
    llm_calls: 0
  expected:
    must_reach: search_ebay_node
    output_contains: "Scanned eBay"   # or "I found the following items"
    queries_cleared: true
    queries_searched_min: 1
    min_llm_calls: 1


- name: two_queries_then_search
  input:
    messages:
      - role: human
        content: "graded PSA 9 Charizard, max $500"
      - role: human
        content: "also a raw Pikachu from Base Set, max $200"
      - role: human
        content: "no"
    query: {}
    llm_calls: 0
  expected:
    must_reach: search_ebay_node
    output_contains: "Scanned eBay"
    queries_searched_min: 2
    queries_cleared: true
    min_llm_calls: 2


- name: graded_charizard_incomplete
  input:
    messages:
      - role: human
        content: "graded PSA 9 Charizard"
      - role: human
        content: "no"
    query: {}
    llm_calls: 0
  expected:
    must_not_reach: search_ebay_node
    queries_cleared: false
    queries_searched_min: 0